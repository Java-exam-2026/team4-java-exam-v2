spring.application.name=java-exam-v2

# Database Configuration (SQLite)
spring.datasource.url=jdbc:sqlite:java-exam.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Session Configuration
# Session timeout set to 24 hours (86400 seconds) to maintain login until next day
server.servlet.session.timeout=86400s
# Remember Me cookie will last for 7 days
spring.security.remember-me.timeout=604800s

# Logging
logging.level.root=INFO
logging.level.com.javaexam=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
logging.level.org.springframework.jdbc.datasource.DataSourceTransactionManager=DEBUG
logging.level.org.springframework.jdbc.support.JdbcTransactionManager=DEBUG
