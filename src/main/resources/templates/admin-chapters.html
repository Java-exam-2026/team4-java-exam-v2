<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>チャプター管理</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>チャプター管理</h2>
            <div>
                <a href="/admin/progress" class="btn btn-secondary me-2">解答状況</a>
                <a href="/admin/questions" class="btn btn-secondary me-2">問題管理</a>
                <a href="/admin/chapters/new" class="btn btn-primary">新しいチャプターを作成</a>
            </div>
        </div>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div class="card">
            <div class="card-body">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ソート順</th>
                            <th>チャプターコード</th>
                            <th>タイトル</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="chapter : ${chapters}">
                            <td th:text="${chapter.sortOrder}">1</td>
                            <td th:text="${chapter.chapterCode}">chap1</td>
                            <td th:text="${chapter.title}">Chapter Title</td>
                            <td>
                                <a th:href="@{/admin/chapters/edit/{id}(id=${chapter.id})}" 
                                   class="btn btn-sm btn-outline-primary">編集</a>
                                <form th:action="@{/admin/chapters/delete/{id}(id=${chapter.id})}" 
                                      method="post" class="d-inline"
                                      onsubmit="return confirm('このチャプターを削除してもよろしいですか？関連する問題も削除される可能性があります。');">
                                    <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
