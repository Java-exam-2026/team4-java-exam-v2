<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${isEdit} ? 'チャプターの編集' : '新しいチャプターを作成'">チャプターフォーム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .form-section {
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="mb-3">
            <a href="/admin/chapters" class="btn btn-secondary">← チャプター一覧に戻る</a>
        </div>
        
        <h2 class="mb-4" th:text="${isEdit} ? 'チャプターの編集' : '新しいチャプターを作成'">チャプターフォーム</h2>

        <div class="card">
            <div class="card-body">
                <form th:action="${isEdit} ? @{/admin/chapters/edit/{id}(id=${chapterForm.id})} : @{/admin/chapters/new}" 
                      method="post" 
                      th:object="${chapterForm}">
                    
                    <div class="form-section">
                        <label for="chapterCode" class="form-label">チャプターコード <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{chapterCode}" id="chapterCode" class="form-control" 
                               placeholder="例: chap1" required>
                        <small class="text-muted">例: chap1, chap2, chap3</small>
                        <div th:if="${#fields.hasErrors('chapterCode')}" class="text-danger">
                            <small th:errors="*{chapterCode}"></small>
                        </div>
                    </div>

                    <div class="form-section">
                        <label for="title" class="form-label">タイトル <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{title}" id="title" class="form-control" 
                               placeholder="例: Javaの基礎" required>
                        <div th:if="${#fields.hasErrors('title')}" class="text-danger">
                            <small th:errors="*{title}"></small>
                        </div>
                    </div>

                    <div class="form-section">
                        <label for="sortOrder" class="form-label">ソート順 <span class="text-danger">*</span></label>
                        <input type="number" th:field="*{sortOrder}" id="sortOrder" class="form-control" 
                               placeholder="例: 1" required min="0">
                        <small class="text-muted">表示順序を決定する番号（小さい方が先に表示されます）</small>
                        <div th:if="${#fields.hasErrors('sortOrder')}" class="text-danger">
                            <small th:errors="*{sortOrder}"></small>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" 
                                th:text="${isEdit} ? '更新' : '作成'">作成</button>
                        <a href="/admin/chapters" class="btn btn-secondary">キャンセル</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
