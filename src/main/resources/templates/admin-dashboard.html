<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <h2 class="mb-4">管理者メニュー</h2>
        <div class="row">

            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5>🛠️機能一覧</h5>
                        <h5 class="card-title">ユーザー一覧</h5>
                        <p class="card-text">全てのユーザー一覧、回答状況、進捗状況とスコアを確認できます。</p>
                        <a th:href="@{/admin/users}" class="btn btn-outline-primary mb-2 d-block">ユーザー一覧を見る</a>
                        <h5 class="card-title">全ユーザーの回答状況</h5>
                        <p class="card-text">全てのユーザーの進捗状況とスコアを確認できます。</p>
                        <a href="/admin/progress" class="btn btn-outline-primary mb-2 d-block">回答状況を見る</a>
                        <h5 class="card-title">全問題と答え</h5>
                        <p class="card-text">全ての問題文と正解を確認できます。</p>
                        <a th:href="@{/admin/questions}" class="btn btn-outline-primary d-block">問題と答えを見る</a>
                        <h5 class="card-title">ユーザーの監査ログ</h5>
                        <p class="card-text">全てのユーザーの監査ログを見れます</p>
                        <a th:href="@{/admin/audit-logs}" class="btn btn-outline-primary d-block">監査ログを見る</a>

                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-3">
                <div class="card h-100">
                    <div class="card-body">
                        <h5>📊 統計データ</h5>
                        <div class="mb-3">
                            <p class="text-muted mb-1">総ユーザー数</p>
                            <h3 th:text="${userCount}">0</h3>
                        </div>
                        <hr>
                        <div>
                            <div class="mb-4">
                                <p class="text-muted mb-1">今月の累計受験数</p>
                                <h3 th:text="${monthlyCount}">0</h3>
                                <p class="small text-secondary">※当月の全ユーザーの解答回数</p>
                            </div>
                        </div>

                        <hr class="mx-3">
                        <div class="pt-3">
                            <h6 class="text-center mb-3">合格・不合格の比率</h6>
                            <div style="height: 250px; width: 250px; margin: auto; position: relative;">
                                <canvas id="passFailChart"></canvas>
                            </div>
                        </div>
                        <hr>
                        <h6 class="text-center mb-3">チャプター別挑戦者数（人気順）</h6>
                        <div style="height: 400px; width: 100%; position: relative;">
                            <canvas id="chapterChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
            <hr>
            <a th:href="@{/}" class="btn btn-secondary">一般画面に戻る</a>
        </div>
        <script th:inline="javascript">
            
            // ThymeleafからJavaのMapデータを取得
            const stats = /*[[${passFailStats}]]*/ { pass: 0, fail: 0 };

            // ★追加：合格率を計算する
            const total = stats.pass + stats.fail;
            const passRate = total > 0 ? Math.round((stats.pass / total) * 100) : 0;

            const ctx = document.getElementById('passFailChart').getContext('2d');
            // グラフの描画設定
            new Chart(ctx, {
                type: 'doughnut', // ドーナツ型のグラフ
                data: {
                    labels: ['合格 (' + passRate + '%)', '不合格'],
                    datasets: [{
                        data: [stats.pass, stats.fail],
                        backgroundColor: ['#28a745', '#dc3545'], // 緑と赤
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: false,
                    plugins: {
                        legend: {
                            position: 'bottom'
                        },
                        title: {
                            display: true,
                            text: '全体合格率: ' + passRate + '%',
                            font: {
                                size: 16
                            }
                        }
                    }
                }
            });


            // 1. Javaから届いた chapterStats を受け取る
            const chapterData = /*[[${chapterStats}]]*/ {};

            // 2. 【ここを修正！】Mapの順番をそのまま配列にする
            const labels = Object.keys(chapterData);
            const values = Object.values(chapterData);

            // 3. Chart.js で棒グラフを描く
            const ctx2 = document.getElementById('chapterChart').getContext('2d');
            new Chart(ctx2, {
                type: 'bar',
                data: {
                    labels: labels, // 保存した順番のラベルを使う
                    datasets: [{
                        label: '挑戦者数',
                        data: values, // 保存した順番の値を使う
                        backgroundColor: values.map((v) => v === values[0] ? '#ffc107' : '#007bff')
                    }]
                },
                options: {
                    indexAxis: 'y', // 横棒グラフ
                    responsive: true,
                    maintainAspectRatio: false,
                    // ★ scales という項目を作って、その中に x を入れます
                    scales: {
                        x: {
                            ticks: {
                                stepSize: 1,      // 1目盛りを「1」刻みにする
                                precision: 0      // 小数点以下は表示しない
                            },
                            beginAtZero: true     // 必ず0から始める
                        }
                    }
                }
            });
            // 3. ★相手のCSVファイル選択JS
            document.addEventListener("DOMContentLoaded", function () {
                const fileInput = document.getElementById("csvFile");
                const fileNameText = document.getElementById("selectedFileName");
                const submitButton = document.getElementById("csvImportSubmit");

                if (fileInput) {
                    fileInput.addEventListener("change", function () {
                        if (fileInput.files && fileInput.files.length > 0) {
                            fileNameText.textContent = "選択中: " + fileInput.files[0].name;
                            submitButton.disabled = false;
                        } else {
                            fileNameText.textContent = "ファイルが選択されていません";
                            submitButton.disabled = true;
                        }
                    });
                }
            });
        </script>
</body>

</html>
