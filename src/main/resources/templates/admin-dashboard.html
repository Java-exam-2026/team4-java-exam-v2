<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4">管理者メニュー</h2>
        <div class="row">
            
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5>〇機能一覧</h5>
                        <h5 class="card-title">全ユーザーの回答状況</h5>
                            <p class="card-text">全てのユーザーの進捗状況とスコアを確認できます。</p>
                        <a href="/admin/progress" class="btn btn-outline-primary mb-2 d-block">回答状況を見る</a>
                         <h5 class="card-title">全問題と答え</h5>
                            <p class="card-text">全ての問題文と正解を確認できます。</p>
                        <a href="/admin/questions" class="btn btn-outline-primary d-block">問題と答えを見る</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5>総ユーザー数</h5>
                        <h3 th:text="${userCount}">0</h3> 
                    </div>
                </div>
            </div>
        </div>
        <hr>
        <a href="/" class="btn btn-secondary">一般画面に戻る</a>
    </div>
    
</body>
</html>
