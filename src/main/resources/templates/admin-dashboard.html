<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">Java Exam System</a>
        <div class="d-flex">
            <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>
    <div class="container mt-5">
        <h2 class="mb-4">管理者メニュー</h2>
        <div class="row">
            
            <div class="col-md-6 mb-3">
                <div class="card">
                    <div class="card-body">
                        <h5>〇機能一覧</h5>
                        <h5 class="card-title">全ユーザーの回答状況</h5>
                            <p class="card-text">全てのユーザーの進捗状況とスコアを確認できます。</p>
                        <a href="/admin/progress" class="btn btn-outline-primary mb-2 d-block">回答状況を見る</a>
                         <h5 class="card-title">全問題と答え</h5>
                            <p class="card-text">全ての問題文と正解を確認できます。</p>
                        <a href="/admin/questions" class="btn btn-outline-primary d-block">問題と答えを見る</a>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
    <div class="card h-100"> <div class="card-body">
            <h5>📊 統計データ</h5>
            <div class="mb-3">
                <p class="text-muted mb-1">総ユーザー数</p>
                <h3 th:text="${userCount}">0</h3> 
            </div>
            <hr>
            <div>
                <p class="text-muted mb-1">今月の累計受験数</p>
                <h3 th:text="${monthlyCount}">0</h3>
                <p class="small text-secondary">※当月の全ユーザーの解答回数</p>
            </div>
        </div>
    </div>
</div>
        </div>
        <hr>
        <a href="/" class="btn btn-secondary">一般画面に戻る</a>
    </div>
    
</body>
</html>
