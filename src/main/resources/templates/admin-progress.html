<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>全ユーザーの回答状況</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="mb-3">
            <a href="/" class="btn btn-secondary">← ダッシュボードに戻る</a>
        </div>
        
        <h2 class="mb-4">全ユーザーの回答状況</h2>

        <div class="card">
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead>
                            <tr>
                                <th>ユーザー名</th>
                                <th>表示名</th>
                                <th>チャプターコード</th>
                                <th>チャプタータイトル</th>
                                <th>スコア</th>
                                <th>合格</th>
                                <th>最終受験日時</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="progress : ${progressList}">
                                <td th:text="${progress.username}">username</td>
                                <td th:text="${progress.displayName}">Display Name</td>
                                <td th:text="${progress.chapterCode}">chap1</td>
                                <td th:text="${progress.title}">Chapter Title</td>
                                <td>
                                    <span class="badge" 
                                          th:classappend="${progress.score >= 80} ? 'bg-success' : 'bg-warning'"
                                          th:text="${progress.score} + '%'">0%</span>
                                </td>
                                <td>
                                    <span th:if="${progress.passed}" class="badge bg-success">合格</span>
                                    <span th:unless="${progress.passed}" class="badge bg-danger">不合格</span>
                                </td>
                                <td th:text="${#temporals.format(progress.lastAttemptedAt, 'yyyy-MM-dd HH:mm')}">2024-01-01 12:00</td>
                            </tr>
                            <tr th:if="${#lists.isEmpty(progressList)}">
                                <td colspan="7" class="text-center text-muted">まだ回答データがありません</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
