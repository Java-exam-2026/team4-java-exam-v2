<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ユーザー管理</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        background: linear-gradient(180deg, #f8faff 0%, #eef3ff 100%);
        color: #24324b;
      }

      .page-shell {
        max-width: 1080px;
      }

      .users-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 18px 48px rgba(61, 91, 169, 0.12);
      }

      .users-card .card-body {
        padding: 2rem;
      }

      .page-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0;
      }

      .page-subtitle {
        margin: 0.35rem 0 0;
        color: #6c7a96;
        font-size: 0.95rem;
      }

      .add-user-btn {
        border-radius: 999px;
        padding: 0.75rem 1.35rem;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
      }

      .users-table {
        margin-bottom: 0;
        min-width: 720px;
      }

      .users-table thead th {
        border-bottom-width: 1px;
        color: #5f6f8f;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding-top: 1rem;
        padding-bottom: 1rem;
        white-space: nowrap;
      }

      .users-table tbody td {
        padding-top: 1rem;
        padding-bottom: 1rem;
        vertical-align: middle;
      }

      .user-name {
        font-weight: 700;
        color: #24324b;
      }

      .username-text {
        color: #6c7a96;
        font-size: 0.9rem;
      }

      .role-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 96px;
        padding: 0.45rem 0.8rem;
        border-radius: 999px;
        background-color: #eef2ff;
        color: #4a57c5;
        font-size: 0.85rem;
        font-weight: 700;
      }

      .action-buttons {
        display: flex;
        gap: 0.5rem;
        justify-content: flex-end;
        white-space: nowrap;
      }

      .empty-state {
        border: 1px dashed #cfd9f4;
        border-radius: 16px;
        background-color: #f8faff;
        color: #6c7a96;
        padding: 2rem;
        text-align: center;
      }

      .modal-content {
        border: none;
        border-radius: 20px;
        box-shadow: 0 18px 48px rgba(61, 91, 169, 0.16);
      }

      .modal-header,
      .modal-footer {
        border-color: #e7ecf8;
      }

      .modal-title {
        font-weight: 700;
      }

      .form-label {
        font-weight: 600;
        color: #44516c;
      }

      @media (max-width: 767.98px) {
        .users-card .card-body {
          padding: 1.25rem;
        }

        .header-actions {
          width: 100%;
        }

        .add-user-btn {
          width: 100%;
          justify-content: center;
        }

        .action-buttons {
          justify-content: flex-start;
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container page-shell">
        <a class="navbar-brand fw-semibold" href="/">Java Exam System</a>
        <div class="d-flex align-items-center gap-3">
          <span class="navbar-text" th:text="${#authentication.name}"
            >admin</span
          >
          <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light btn-sm">
              ログアウト
            </button>
          </form>
        </div>
      </div>
    </nav>

    <main class="container page-shell py-4 py-md-5">
      <div class="mb-3">
        <a href="/" class="btn btn-secondary">← ダッシュボードに戻る</a>
      </div>

      <div
        class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 mb-4"
      >
        <div>
          <h1 class="page-title">ユーザー管理</h1>
          <p class="page-subtitle">
            表示名、ユーザー名、ロールを一覧で確認できる管理画面です。
          </p>
        </div>
        <div class="header-actions d-flex gap-2 flex-column flex-sm-row">
          <a href="" class="btn btn-outline-secondary add-user-btn">
            +CSVからユーザーをインポート
          </a>
          <button
            type="button"
            class="btn btn-primary add-user-btn"
            data-bs-toggle="modal"
            data-bs-target="#createUserModal"
          >
            新規ユーザー登録
          </button>
        </div>
      </div>

      <div
        th:if="${message}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${message}">完了メッセージ</span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="閉じる"
        ></button>
      </div>

      <div
        th:if="${error}"
        class="alert alert-danger alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${error}">エラーメッセージ</span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="閉じる"
        ></button>
      </div>

      <section class="card users-card">
        <div class="card-body">
          <div class="table-wrap">
            <table class="table align-middle users-table">
              <thead>
                <tr>
                  <th scope="col">表示名</th>
                  <th scope="col">ユーザー名</th>
                  <th scope="col">ロール</th>
                  <th scope="col" class="text-end">操作</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="user : ${users}">
                  <td>
                    <div class="user-name" th:text="${user.displayName}">表示名</div>
                  </td>
                  <td>
                    <div class="username-text" th:text="${user.username}">
                      username
                    </div>
                  </td>
                  <td>
                    <span class="role-badge" th:text="${user.role}">ROLE_USER</span>
                  </td>
                  <td>
                    <div class="action-buttons">
                      <button
                        type="button"
                        class="btn btn-sm btn-outline-primary edit-user-trigger"
                        data-bs-toggle="modal"
                        data-bs-target="#editUserModal"
                        th:attr="data-user-id=${user.id},data-username=${user.username},data-display-name=${user.displayName},data-role=${user.role}"
                      >
                        編集
                      </button>
                      <form th:action="@{/admin/users/delete/{id}(id=${user.id})}" method="post">
                        <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                      </form>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="empty-state mt-4 d-none">
            登録されているユーザーがいない場合はここに案内を表示できます。
          </div>
        </div>
      </section>
    </main>

    <div
      class="modal fade"
      id="createUserModal"
      tabindex="-1"
      aria-labelledby="createUserModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form th:action="@{/admin/users}" method="post">
            <div class="modal-header">
              <h2 class="modal-title fs-5" id="createUserModalLabel">
                新規ユーザー登録
              </h2>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="閉じる"
              ></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="username" class="form-label">ユーザー名</label>
                <input
                  type="text"
                  class="form-control"
                  id="username"
                  name="username"
                  placeholder="例: taro.yamada"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="displayName" class="form-label">表示名</label>
                <input
                  type="text"
                  class="form-control"
                  id="displayName"
                  name="displayName"
                  placeholder="例: 山田 太郎"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">パスワード</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  name="password"
                  placeholder="パスワードを入力"
                  required
                />
              </div>
              <div class="mb-0">
                <label for="role" class="form-label">ロール</label>
                <select class="form-select" id="role" name="role" required>
                  <option value="">選択してください</option>
                  <option value="ROLE_USER">ROLE_USER</option>
                  <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                </select>
              </div>

            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-outline-secondary"
                data-bs-dismiss="modal"
              >
                キャンセル
              </button>
              <button type="submit" class="btn btn-primary">作成</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="editUserModal"
      tabindex="-1"
      aria-labelledby="editUserModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
          <form th:action="@{/admin/users/edit/__ID__}" method="post" id="editUserForm">
            <input type="hidden" id="editUserId" name="id" />
            <div class="modal-header">
              <h2 class="modal-title fs-5" id="editUserModalLabel">
                ユーザー編集
              </h2>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
                aria-label="閉じる"
              ></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="editUsername" class="form-label">ユーザー名</label>
                <input
                  type="text"
                  class="form-control"
                  id="editUsername"
                  name="username"
                  placeholder="例: taro.yamada"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="editDisplayName" class="form-label">表示名</label>
                <input
                  type="text"
                  class="form-control"
                  id="editDisplayName"
                  name="displayName"
                  placeholder="例: 山田 太郎"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="editPassword" class="form-label">パスワード</label>
                <input
                  type="password"
                  class="form-control"
                  id="editPassword"
                  name="password"
                  placeholder="変更する場合のみ入力"
                />
                <div class="form-text">
                  未入力の場合は現在のパスワードを保持します。
                </div>
              </div>
              <div class="mb-0">
                <label for="editRole" class="form-label">ロール</label>
                <select class="form-select" id="editRole" name="role" required>
                  <option value="">選択してください</option>
                  <option value="ROLE_USER">ROLE_USER</option>
                  <option value="ROLE_ADMIN">ROLE_ADMIN</option>
                </select>
              </div>

            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-outline-secondary"
                data-bs-dismiss="modal"
              >
                キャンセル
              </button>
              <button type="submit" class="btn btn-primary">更新</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const editUserModal = document.getElementById("editUserModal");
        const editUserId = document.getElementById("editUserId");
        const editUserForm = document.getElementById("editUserForm");
        const editUsername = document.getElementById("editUsername");
        const editDisplayName = document.getElementById("editDisplayName");
        const editPassword = document.getElementById("editPassword");
        const editRole = document.getElementById("editRole");

        if (
          !editUserModal ||
          !editUserId ||
          !editUserForm ||
          !editUsername ||
          !editDisplayName ||
          !editPassword ||
          !editRole
        ) {
          return;
        }

        editUserModal.addEventListener("show.bs.modal", function (event) {
          const trigger = event.relatedTarget;
          if (!trigger) {
            return;
          }

          editUserId.value = trigger.getAttribute("data-user-id") || "";
          editUserForm.action = "/admin/users/edit/" + editUserId.value;
          editUsername.value = trigger.getAttribute("data-username") || "";
          editDisplayName.value =
            trigger.getAttribute("data-display-name") || "";
          editPassword.value = "";
          editRole.value = trigger.getAttribute("data-role") || "";
        });
      });
    </script>
  </body>
</html>
