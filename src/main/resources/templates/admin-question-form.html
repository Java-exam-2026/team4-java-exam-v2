<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${isEdit} ? '問題の編集' : '新しい問題を作成'">問題フォーム</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .form-section {
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="mb-3">
            <a href="/admin/questions" class="btn btn-secondary">← 問題一覧に戻る</a>
        </div>
        
        <h2 class="mb-4" th:text="${isEdit} ? '問題の編集' : '新しい問題を作成'">問題フォーム</h2>

        <div class="card">
            <div class="card-body">
                <form th:action="${isEdit} ? @{/admin/questions/edit/{id}(id=${questionForm.id})} : @{/admin/questions/new}" 
                      method="post" 
                      th:object="${questionForm}">
                    
                    <div class="form-section">
                        <label for="chapterId" class="form-label">チャプター <span class="text-danger">*</span></label>
                        <select th:field="*{chapterId}" id="chapterId" class="form-select" required>
                            <option value="">-- チャプターを選択 --</option>
                            <option th:each="chapter : ${chapters}" 
                                    th:value="${chapter.id}" 
                                    th:text="${chapter.chapterCode} + ' - ' + ${chapter.title}">
                            </option>
                        </select>
                        <div th:if="${#fields.hasErrors('chapterId')}" class="text-danger">
                            <small th:errors="*{chapterId}"></small>
                        </div>
                    </div>

                    <div class="form-section">
                        <label for="questionText" class="form-label">問題文 <span class="text-danger">*</span></label>
                        <textarea th:field="*{questionText}" id="questionText" class="form-control" rows="3" required></textarea>
                        <div th:if="${#fields.hasErrors('questionText')}" class="text-danger">
                            <small th:errors="*{questionText}"></small>
                        </div>
                    </div>

                    <div class="form-section">
                        <label for="questionType" class="form-label">問題タイプ <span class="text-danger">*</span></label>
                        <select th:field="*{questionType}" id="questionType" class="form-select" required>
                            <option value="">-- タイプを選択 --</option>
                            <option th:each="type : ${questionTypes}" 
                                    th:value="${type}" 
                                    th:text="${type}">
                            </option>
                        </select>
                        <div th:if="${#fields.hasErrors('questionType')}" class="text-danger">
                            <small th:errors="*{questionType}"></small>
                        </div>
                    </div>

                    <div class="form-section">
                        <h5>選択肢</h5>
                        
                        <div class="mb-2">
                            <label for="optionA" class="form-label">選択肢 A</label>
                            <input type="text" th:field="*{optionA}" id="optionA" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label for="optionB" class="form-label">選択肢 B</label>
                            <input type="text" th:field="*{optionB}" id="optionB" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label for="optionC" class="form-label">選択肢 C</label>
                            <input type="text" th:field="*{optionC}" id="optionC" class="form-control">
                        </div>

                        <div class="mb-2">
                            <label for="optionD" class="form-label">選択肢 D</label>
                            <input type="text" th:field="*{optionD}" id="optionD" class="form-control">
                        </div>
                    </div>

                    <div class="form-section">
                        <label for="correctAnswer" class="form-label">正解 <span class="text-danger">*</span></label>
                        <input type="text" th:field="*{correctAnswer}" id="correctAnswer" class="form-control" 
                               placeholder="例: A" required>
                        <small class="text-muted">正解の選択肢を入力してください（例: A, B, C, D）</small>
                        <div th:if="${#fields.hasErrors('correctAnswer')}" class="text-danger">
                            <small th:errors="*{correctAnswer}"></small>
                        </div>
                    </div>

                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary" 
                                th:text="${isEdit} ? '更新' : '作成'">作成</button>
                        <a href="/admin/questions" class="btn btn-secondary">キャンセル</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
