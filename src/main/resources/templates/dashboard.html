<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div sec:authorize="hasRole('ADMIN')" class="alert alert-info mb-4">
            <h4 class="alert-heading">管理者モード</h4>
            <p>ここは一般ユーザー用の画面です。管理用ダッシュボードへ戻るには以下のボタンを押してください。</p>
            <hr>
            <a href="/admin/dashboard" class="btn btn-info">管理者ダッシュボードへ</a>
        </div>

        <div sec:authorize="isAuthenticated()">
            <h2 class="mb-4">利用可能なチャプター</h2>
            <div class="row">
                <div class="col-md-4 mb-4" th:each="chapter : ${chapters}">
                    <div class="card h-100">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${chapter.title}">Chapter Title</h5>
                            <p class="card-text text-muted">チャプターごとのクイズに挑戦しましょう。</p>

                            <div th:if="${progressMap != null and progressMap.containsKey(chapter.chapterCode)}" class="mb-2">
                                <span th:if="${progressMap.get(chapter.chapterCode).hasSubmitted}" class="badge bg-secondary">提出済み</span>
                                <span th:if="${progressMap.get(chapter.chapterCode).passed}" class="badge bg-success">合格</span>
                                <span th:unless="${progressMap.get(chapter.chapterCode).passed}"
                                      class="badge bg-warning text-dark">
                                    スコア: <span th:text="${progressMap.get(chapter.chapterCode).score}">0</span>%
                                </span>
                            </div>

                            <a th:if="${progressMap == null or !progressMap.containsKey(chapter.chapterCode) or !progressMap.get(chapter.chapterCode).hasSubmitted}"
                               th:href="@{/quiz/{code}(code=${chapter.chapterCode})}" class="btn btn-primary">クイズ開始</a>
                            <a th:if="${progressMap != null and progressMap.containsKey(chapter.chapterCode) and progressMap.get(chapter.chapterCode).hasSubmitted}"
                               th:href="@{/quiz/{code}/results(code=${chapter.chapterCode})}" class="btn btn-info">結果を表示</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
