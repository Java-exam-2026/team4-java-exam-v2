<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Admin Menu -->
        <div sec:authorize="hasRole('ADMIN')" class="mb-4">
            <h2 class="mb-3">管理者メニュー</h2>
            <div class="row">
                <div class="col-md-6 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">全ユーザーの進捗確認</h5>
                            <p class="card-text">全てのユーザーの回答履歴とスコアを確認できます。</p>
                            <div class="d-flex gap-2 flex-wrap">
                                <a href="/admin/progress" class="btn btn-primary">進捗を確認する</a>
                                <button type="button"
                                        class="btn btn-primary"
                                        data-bs-toggle="modal"
                                        data-bs-target="#csvImportModal">
                                    + CSVからユーザーをインポートする
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="col-md-6 mb-3">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">全問題と答え</h5>
                            <p class="card-text">全ての問題文と正解を確認できます。</p>
                            <a href="/admin/questions" class="btn btn-primary">問題と答えを見る</a>
                        </div>
                    </div>
                </div>
            </div>

            <div class="modal fade" id="csvImportModal" tabindex="-1" aria-labelledby="csvImportModalLabel" aria-hidden="true">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <form th:action="@{/admin/import/csv/users}" method="post" enctype="multipart/form-data">
                            <div class="modal-header">
                                <h5 class="modal-title" id="csvImportModalLabel">CSVからユーザーをインポートする</h5>
                                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="閉じる"></button>
                            </div>

                            <div class="modal-body">
                                <div class="mb-3">
                                    <label for="csvFile" class="form-label">CSVファイルを選択</label>
                                    <input class="form-control"
                                           type="file"
                                           id="csvFile"
                                           name="file"
                                           accept=".csv"
                                           required>
                                </div>

                                <div class="small text-muted mb-3" id="selectedFileName">
                                    ファイルが選択されていません
                                </div>

                                <div class="alert alert-info mb-0" role="alert">
                                    CSVを選択して「完了」を押すとインポートが実行されます。
                                </div>
                            </div>

                            <div class="modal-footer">
                                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                                <button type="submit" class="btn btn-primary" id="csvImportSubmit" disabled>完了</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- User Chapters (only for non-admin users) -->
        <div sec:authorize="hasRole('USER')">
            <h2 class="mb-4">Available Chapters</h2>
            <div class="row">
                <div class="col-md-4 mb-4" th:each="chapter : ${chapters}">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title" th:text="${chapter.title}">Chapter Title</h5>
                            <p class="card-text text-muted">Chapter overview coming soon.</p>

                            <div th:if="${progressMap != null and progressMap.containsKey(chapter.chapterCode)}" class="mb-2">
                                <span th:if="${progressMap.get(chapter.chapterCode).hasSubmitted}" class="badge bg-secondary">Submitted</span>
                                <span th:if="${progressMap.get(chapter.chapterCode).passed}" class="badge bg-success">Passed</span>
                                <span th:unless="${progressMap.get(chapter.chapterCode).passed}"
                                      class="badge bg-warning text-dark">
                                    Score: <span th:text="${progressMap.get(chapter.chapterCode).score}">0</span>%
                                </span>
                            </div>

                            <a th:if="${progressMap == null or !progressMap.containsKey(chapter.chapterCode) or !progressMap.get(chapter.chapterCode).hasSubmitted}"
                               th:href="@{/quiz/{code}(code=${chapter.chapterCode})}" class="btn btn-primary">Start Quiz</a>
                            <a th:if="${progressMap != null and progressMap.containsKey(chapter.chapterCode) and progressMap.get(chapter.chapterCode).hasSubmitted}"
                               th:href="@{/quiz/{code}/results(code=${chapter.chapterCode})}" class="btn btn-info">View Results</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const fileInput = document.getElementById("csvFile");
            const fileNameText = document.getElementById("selectedFileName");
            const submitButton = document.getElementById("csvImportSubmit");

            if (!fileInput || !fileNameText || !submitButton) {
                return;
            }

            fileInput.addEventListener("change", function () {
                if (fileInput.files && fileInput.files.length > 0) {
                    fileNameText.textContent = "選択中: " + fileInput.files[0].name;
                    submitButton.disabled = false;
                } else {
                    fileNameText.textContent = "ファイルが選択されていません";
                    submitButton.disabled = true;
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
