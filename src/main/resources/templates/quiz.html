<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title th:text="${chapterTitle}">Quiz</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h2 class="mb-4" th:text="${chapterTitle}">Chapter Title</h2>

        <form th:action="@{/quiz/{code}(code=${chapterCode})}" th:object="${submission}" method="post">
            <input type="hidden" th:field="*{chapterCode}" />

            <div th:each="question, stat : ${questions}" class="card mb-4">
                <div class="card-body">
                    <h5 class="card-title">
                        <span th:text="${stat.count} + '. ' + ${question.questionText}">Question</span>
                    </h5>

                    <input type="hidden" th:name="|answers[${stat.index}].questionId|" th:value="${question.id}" />

                    <div th:each="option : ${question.options}" class="form-check">
                        <input class="form-check-input" type="radio" th:name="|answers[${stat.index}].selectedAnswer|"
                            th:value="${option.key}" th:id="|q${stat.index}o${option.key}|" required>
                        <label class="form-check-label" th:for="|q${stat.index}o${option.key}|"
                            th:text="${option.value}">
                            Option Text
                        </label>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg mb-5">Submit Answers</button>
        </form>
    </div>
</body>

</html>
