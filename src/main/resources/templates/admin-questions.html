<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>全問題と答え</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .question-card {
            margin-bottom: 1rem;
        }
        .correct-answer {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="mb-3">
            <a href="/" class="btn btn-secondary">← ダッシュボードに戻る</a>
        </div>
        
        <h2 class="mb-4">全問題と答え</h2>

        <div th:if="${#lists.isEmpty(questions)}" class="alert alert-info">
            まだ問題がありません
        </div>

        <div th:each="question, stat : ${questions}" class="card question-card">
            <div class="card-header">
                <strong>問題 <span th:text="${stat.count}">1</span></strong> 
                <span class="badge bg-secondary" th:text="${question.chapterCode}">chap1</span>
            </div>
            <div class="card-body">
                <h5 class="card-title" th:text="${question.questionText}">Question Text</h5>
                
                <div class="mb-3">
                    <h6>選択肢:</h6>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="option : ${question.options}">
                            <strong th:text="${option.key}">A</strong>: <span th:text="${option.value}">Option</span>
                        </li>
                    </ul>
                </div>
                
                <div class="correct-answer">
                    <i class="bi bi-check-circle"></i> 正解: <span th:text="${question.correctAnswer}">A</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
