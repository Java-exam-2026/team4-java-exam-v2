<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>全問題と答え</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .question-card {
            margin-bottom: 1rem;
        }
        .correct-answer {
            background-color: #d4edda;
            border: 1px solid #c3e6cb;
            padding: 0.5rem;
            border-radius: 0.25rem;
            font-weight: bold;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="mb-3">
            <a href="/" class="btn btn-secondary">← ダッシュボードに戻る</a>
        </div>
        
        <h2 class="mb-4">全問題と答え</h2>

        <div th:if="${message}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${message}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>

        <div class="mb-3">
            <a href="/admin/questions/new" class="btn btn-primary">+ 新しい問題を作成</a>
        </div>

        <div th:if="${#lists.isEmpty(questions)}" class="alert alert-info">
            まだ問題がありません
        </div>

        <div th:each="question, stat : ${questions}" class="card question-card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <div>
                    <strong>問題 <span th:text="${stat.count}">1</span></strong> 
                    <span class="badge bg-secondary" th:text="${question.chapterCode}">chap1</span>
                    <small class="text-muted ms-2">ID: <span th:text="${question.id}">id</span></small>
                </div>
                <div>
                    <a th:href="@{/admin/questions/edit/{id}(id=${question.id})}" class="btn btn-sm btn-outline-primary">編集</a>
                    <form th:action="@{/admin/questions/delete/{id}(id=${question.id})}" method="post" class="d-inline" 
                          onsubmit="return confirm('この問題を削除してもよろしいですか？');">
                        <button type="submit" class="btn btn-sm btn-outline-danger">削除</button>
                    </form>
                </div>
            </div>
            <div class="card-body">
                <h5 class="card-title" th:text="${question.questionText}">Question Text</h5>
                
                <div class="mb-3">
                    <h6>選択肢:</h6>
                    <ul class="list-group list-group-flush">
                        <li class="list-group-item" th:each="option : ${question.options}">
                            <strong th:text="${option.key}">A</strong>: <span th:text="${option.value}">Option</span>
                        </li>
                    </ul>
                </div>
                
                <div class="correct-answer">
                    <i class="bi bi-check-circle"></i> 正解: <span th:text="${question.correctAnswer}">A</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
