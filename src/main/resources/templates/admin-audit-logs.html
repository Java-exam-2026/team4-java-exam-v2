<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>監査ログ</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        background: linear-gradient(180deg, #f8faff 0%, #eef3ff 100%);
        color: #24324b;
      }

      .page-shell {
        max-width: 1180px;
      }

      .logs-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 18px 48px rgba(61, 91, 169, 0.12);
      }

      .logs-card .card-body {
        padding: 2rem;
      }

      .page-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0;
      }

      .page-subtitle {
        margin: 0.35rem 0 0;
        color: #6c7a96;
        font-size: 0.95rem;
      }

      .search-panel {
        border: 1px solid #e7ecf8;
        border-radius: 16px;
        background-color: #f8faff;
        padding: 1rem;
        margin-bottom: 1.5rem;
      }

      .search-label {
        font-size: 0.9rem;
        font-weight: 700;
        color: #44516c;
        min-width: 90px;
      }

      .search-button {
        border-radius: 999px;
        padding-left: 1.2rem;
        padding-right: 1.2rem;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
      }

      .logs-table {
        margin-bottom: 0;
        min-width: 980px;
      }

      .logs-table thead th {
        border-bottom-width: 1px;
        color: #5f6f8f;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding-top: 1rem;
        padding-bottom: 1rem;
        white-space: nowrap;
      }

      .logs-table tbody td {
        padding-top: 1rem;
        padding-bottom: 1rem;
        vertical-align: top;
      }

      .target-name {
        font-weight: 700;
        color: #24324b;
      }

      .meta-text {
        color: #6c7a96;
        font-size: 0.9rem;
      }

      .type-badge,
      .action-badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 88px;
        padding: 0.45rem 0.8rem;
        border-radius: 999px;
        font-size: 0.82rem;
        font-weight: 700;
      }

      .type-badge {
        background-color: #eef2ff;
        color: #4a57c5;
      }

      .action-badge {
        background-color: #ecfdf3;
        color: #1f7a45;
      }

      .parameters-cell {
        max-width: 320px;
        color: #5b6882;
        font-size: 0.9rem;
        line-height: 1.5;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .empty-state {
        border: 1px dashed #cfd9f4;
        border-radius: 16px;
        background-color: #f8faff;
        color: #6c7a96;
        padding: 2rem;
        text-align: center;
      }

      @media (max-width: 767.98px) {
        .logs-card .card-body {
          padding: 1.25rem;
        }

        .search-panel .row {
          row-gap: 0.75rem;
        }

        .search-label {
          min-width: auto;
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container page-shell">
        <a class="navbar-brand fw-semibold" href="/">Java Exam System</a>
        <div class="d-flex align-items-center gap-3">
          <span class="navbar-text" th:text="${#authentication.name}">admin</span>
          <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light btn-sm">
              ログアウト
            </button>
          </form>
        </div>
      </div>
    </nav>

    <main class="container page-shell py-4 py-md-5">
      <div class="mb-3">
        <a href="/" class="btn btn-secondary">← ダッシュボードに戻る</a>
      </div>

      <div class="mb-4">
        <h1 class="page-title">監査ログ</h1>
        <p class="page-subtitle">
          管理操作の履歴を時系列で確認できます。キーワードで対象名や操作内容を絞り込みできます。
        </p>
      </div>

      <div
        th:if="${message}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${message}">完了メッセージ</span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="閉じる"
        ></button>
      </div>

      <div
        th:if="${error}"
        class="alert alert-danger alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${error}">エラーメッセージ</span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="閉じる"
        ></button>
      </div>

      <section class="card logs-card">
        <div class="card-body">
          <form th:action="@{/admin/audit-logs}" method="get" class="search-panel">
            <div class="row align-items-center g-3">
              <div class="col-12 col-md-auto">
                <span class="search-label">ログ検索</span>
              </div>
              <div class="col-12 col-md">
                <input
                  type="text"
                  name="keyword"
                  th:value="${keyword}"
                  class="form-control"
                  placeholder="対象名、操作、実行者などで検索"
                />
              </div>
              <div class="col-12 col-md-auto">
                <button type="submit" class="btn btn-primary search-button">
                  検索
                </button>
              </div>
            </div>
          </form>

          <div class="table-wrap" th:if="${not #lists.isEmpty(logs)}">
            <table class="table align-middle logs-table">
              <thead>
                <tr>
                  <th scope="col">日時</th>
                  <th scope="col">対象名</th>
                  <th scope="col">種別</th>
                  <th scope="col">操作</th>
                  <th scope="col">実行者</th>
                  <th scope="col">パラメータ</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="log : ${logs}">
                  <td class="meta-text" th:text="${#temporals.format(log.loggedAt, 'yyyy-MM-dd HH:mm:ss')}">
                    2026-04-16 10:00:00
                  </td>
                  <td>
                    <div class="target-name" th:text="${log.resourceName}">
                      山田 太郎
                    </div>
                  </td>
                  <td>
                    <span class="type-badge" th:text="${log.resourceType}">USER</span>
                  </td>
                  <td>
                    <span class="action-badge" th:text="${log.action}">UPDATE</span>
                  </td>
                  <td class="meta-text" th:text="${log.performedBy}">admin</td>
                  <td class="parameters-cell" th:text="${log.parameters}">
                    displayName: 山田 太郎 -> 山田 次郎
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="empty-state" th:if="${#lists.isEmpty(logs)}">
            条件に一致する監査ログがありません。
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
