<!doctype html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>監査ログ</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <style>
      body {
        background: linear-gradient(180deg, #f8faff 0%, #eef3ff 100%);
        color: #24324b;
      }

      .page-shell {
        max-width: 1180px;
      }

      .logs-card {
        border: none;
        border-radius: 20px;
        box-shadow: 0 18px 48px rgba(61, 91, 169, 0.12);
      }

      .logs-card .card-body {
        padding: 2rem;
      }

      .page-title {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0;
      }

      .page-subtitle {
        margin: 0.35rem 0 0;
        color: #6c7a96;
        font-size: 0.95rem;
      }

      .search-panel {
        border: 1px solid #e7ecf8;
        border-radius: 16px;
        background-color: #f8faff;
        padding: 1rem;
        margin-bottom: 1.5rem;
      }

      .search-label {
        font-size: 0.9rem;
        font-weight: 700;
        color: #44516c;
        min-width: 90px;
      }

      .search-button {
        border-radius: 999px;
        padding-left: 1.2rem;
        padding-right: 1.2rem;
        font-weight: 600;
      }

      .table-wrap {
        overflow-x: auto;
      }

      .logs-table {
        margin-bottom: 0;
        min-width: 980px;
      }

      .logs-table thead th {
        border-bottom-width: 1px;
        color: #5f6f8f;
        font-size: 0.85rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding-top: 1rem;
        padding-bottom: 1rem;
        white-space: nowrap;
      }

      .logs-table tbody td {
        padding-top: 1rem;
        padding-bottom: 1rem;
        vertical-align: top;
      }

      .target-name {
        font-weight: 700;
        color: #24324b;
      }

      .meta-text {
        color: #6c7a96;
        font-size: 0.9rem;
      }

      .plain-meta {
        color: #44516c;
        font-size: 0.92rem;
        font-weight: 600;
      }

      .filter-group-label {
        display: block;
        margin-bottom: 0.5rem;
        color: #44516c;
        font-size: 0.9rem;
        font-weight: 700;
      }

      .action-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem 1rem;
      }

      .date-range {
        display: flex;
        align-items: center;
        gap: 0.75rem;
      }

      .date-range span {
        color: #6c7a96;
        font-size: 0.9rem;
      }

      .parameters-cell {
        max-width: 320px;
        color: #5b6882;
        font-size: 0.9rem;
        line-height: 1.5;
        word-break: break-word;
        white-space: pre-wrap;
      }

      .empty-state {
        border: 1px dashed #cfd9f4;
        border-radius: 16px;
        background-color: #f8faff;
        color: #6c7a96;
        padding: 2rem;
        text-align: center;
      }

      @media (max-width: 767.98px) {
        .logs-card .card-body {
          padding: 1.25rem;
        }

        .search-panel .row {
          row-gap: 0.75rem;
        }

        .search-label {
          min-width: auto;
        }

        .date-range {
          flex-direction: column;
          align-items: stretch;
          gap: 0.5rem;
        }
      }
    </style>
  </head>

  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
      <div class="container page-shell">
        <a class="navbar-brand fw-semibold" href="/">Java Exam System</a>
        <div class="d-flex align-items-center gap-3">
          <span class="navbar-text" th:text="${#authentication.name}">admin</span>
          <form th:action="@{/logout}" method="post">
            <button type="submit" class="btn btn-outline-light btn-sm">
              ログアウト
            </button>
          </form>
        </div>
      </div>
    </nav>

    <main class="container page-shell py-4 py-md-5">
      <div class="mb-3">
        <a href="/" class="btn btn-secondary">← ダッシュボードに戻る</a>
      </div>

      <div class="mb-4">
        <h1 class="page-title">監査ログ</h1>
        <p class="page-subtitle">
          管理操作の履歴を時系列で確認できます。ユーザーID、操作種別、期間で絞り込みできます。
        </p>
      </div>

      <div
        th:if="${message}"
        class="alert alert-success alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${message}">完了メッセージ</span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="閉じる"
        ></button>
      </div>

      <div
        th:if="${error}"
        class="alert alert-danger alert-dismissible fade show"
        role="alert"
      >
        <span th:text="${error}">エラーメッセージ</span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
          aria-label="閉じる"
        ></button>
      </div>

      <section class="card logs-card">
        <div class="card-body">
          <form th:action="@{/admin/audit-logs}" method="get" class="search-panel">
            <div class="row g-3">
              <div class="col-12 col-lg-6">
                <label for="actorUserId" class="filter-group-label">ユーザーID</label>
                <input
                  type="text"
                  id="actorUserId"
                  name="actorUserId"
                  th:value="${actorUserId}"
                  class="form-control"
                  placeholder="実行したユーザーIDで検索"
                />
              </div>

              <div class="col-12 col-lg-6">
                <span class="filter-group-label">操作種別</span>
                <div class="action-filters">
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="actionCreate"
                      name="actionTypes"
                      value="CREATE"
                      th:checked="${selectedActionTypes != null and #lists.contains(selectedActionTypes, 'CREATE')}"
                    />
                    <label class="form-check-label" for="actionCreate">作成</label>
                  </div>
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="actionUpdate"
                      name="actionTypes"
                      value="UPDATE"
                      th:checked="${selectedActionTypes != null and #lists.contains(selectedActionTypes, 'UPDATE')}"
                    />
                    <label class="form-check-label" for="actionUpdate">更新</label>
                  </div>
                  <div class="form-check">
                    <input
                      class="form-check-input"
                      type="checkbox"
                      id="actionDelete"
                      name="actionTypes"
                      value="DELETE"
                      th:checked="${selectedActionTypes != null and #lists.contains(selectedActionTypes, 'DELETE')}"
                    />
                    <label class="form-check-label" for="actionDelete">削除</label>
                  </div>
                </div>
              </div>

              <div class="col-12 col-lg-8">
                <span class="filter-group-label">期間</span>
                <div class="date-range">
                  <input
                    type="date"
                    name="startDate"
                    th:value="${startDate}"
                    class="form-control"
                  />
                  <span>～</span>
                  <input
                    type="date"
                    name="endDate"
                    th:value="${endDate}"
                    class="form-control"
                  />
                </div>
              </div>

              <div class="col-12 col-lg-4 d-flex align-items-end justify-content-lg-end">
                <button type="submit" class="btn btn-primary search-button">検索</button>
              </div>
            </div>
          </form>

          <div class="table-wrap" th:if="${not #lists.isEmpty(logs)}">
            <table class="table align-middle logs-table">
              <thead>
                <tr>
                  <th scope="col">日時</th>
                  <th scope="col">対象名</th>
                  <th scope="col">種別</th>
                  <th scope="col">操作</th>
                  <th scope="col">実行者</th>
                  <th scope="col">パラメータ</th>
                </tr>
              </thead>
              <tbody>
                <tr th:each="log : ${logs}">
                  <td class="meta-text" th:text="${#temporals.format(log.loggedAt, 'yyyy-MM-dd HH:mm:ss')}">
                    2026-04-16 10:00:00
                  </td>
                  <td>
                    <div class="target-name" th:text="${log.resourceName}">
                      山田 太郎
                    </div>
                  </td>
                  <td>
                    <span class="plain-meta" th:text="${log.resourceType}">USER</span>
                  </td>
                  <td>
                    <span class="plain-meta" th:text="${log.action}">UPDATE</span>
                  </td>
                  <td class="meta-text" th:text="${log.performedBy}">admin</td>
                  <td class="parameters-cell" th:text="${log.parameters}">
                    displayName: 山田 太郎 -> 山田 次郎
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <div class="empty-state" th:if="${#lists.isEmpty(logs)}">
            条件に一致する監査ログがありません。
          </div>
        </div>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
