<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Quiz Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <div class="card text-center">
            <div class="card-header">
                Quiz Result
            </div>
            <div class="card-body">
                <h5 class="card-title" th:text="${result.passed} ? 'Congratulations!' : 'Keep Trying!'">Result</h5>
                <p class="card-text">
                    You scored <span th:text="${result.score}">0</span>%.
                </p>
                <p class="card-text">
                    Correct Answers: <span th:text="${result.correctAnswers}">0</span> / <span
                        th:text="${result.totalQuestions}">0</span>
                </p>
                <a href="/" class="btn btn-primary">Back to Dashboard</a>
            </div>
        </div>
    </div>
</body>

</html>
