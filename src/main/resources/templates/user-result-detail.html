<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>回答結果詳細</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        .question-card {
            margin-bottom: 1.5rem;
        }
        .correct-answer {
            background-color: #d4edda;
            border-left: 4px solid #28a745;
        }
        .incorrect-answer {
            background-color: #f8d7da;
            border-left: 4px solid #dc3545;
        }
        .answer-label {
            font-weight: bold;
            display: inline-block;
            min-width: 120px;
        }
    </style>
</head>

<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Java Exam System</a>
            <div class="d-flex">
                <span class="navbar-text me-3" th:text="${#authentication.name}">User</span>
                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="mb-3">
            <a href="/" class="btn btn-secondary">← ダッシュボードに戻る</a>
        </div>
        
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="mb-0">回答結果詳細</h2>
        </div>

        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title" th:text="${chapterTitle}">Chapter Title</h5>
                <p class="text-muted mb-0">各問題の回答内容と正誤を表示しています</p>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(answerDetails)}" class="alert alert-info">
            回答データがありません
        </div>

        <div th:each="answer, iterStat : ${answerDetails}" class="card question-card" 
             th:classappend="${answer.isCorrect} ? 'correct-answer' : 'incorrect-answer'">
            <div class="card-body">
                <h5 class="card-title">
                    <span class="badge" th:classappend="${answer.isCorrect} ? 'bg-success' : 'bg-danger'">
                        <span th:text="${answer.isCorrect} ? '正解' : '不正解'">正誤</span>
                    </span>
                    問題 <span th:text="${iterStat.count}">1</span>
                </h5>
                
                <p class="card-text" th:text="${answer.questionText}">Question Text</p>
                
                <div class="mt-3">
                    <div th:if="${answer.options != null and not #maps.isEmpty(answer.options)}" class="mb-3">
                        <strong>選択肢:</strong>
                        <ul class="list-unstyled ms-3 mt-2">
                            <li th:each="option : ${answer.options}">
                                <span th:text="${option.key}">A</span>: 
                                <span th:text="${option.value}">Option text</span>
                            </li>
                        </ul>
                    </div>
                    
                    <div class="row">
                        <div class="col-md-6">
                            <span class="answer-label text-primary">あなたの回答:</span>
                            <span th:text="${answer.selectedAnswer}">User Answer</span>
                        </div>
                        <div class="col-md-6">
                            <span class="answer-label text-success">正解:</span>
                            <span th:text="${answer.correctAnswer}">Correct Answer</span>
                        </div>
                    </div>
                </div>
                
                <div class="text-muted mt-2 small">
                    <span th:if="${answer.answeredAt != null}">
                        回答日時: <span th:text="${#temporals.format(answer.answeredAt, 'yyyy-MM-dd HH:mm:ss')}">2024-01-01 12:00:00</span>
                    </span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
