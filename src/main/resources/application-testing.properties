spring.application.name=java-exam-v2
server.port=8081

# Database Configuration (SQLite)
spring.datasource.url=jdbc:sqlite:java-exam-testing.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Session Configuration
# Session timeout set to 24 hours (86400 seconds) to maintain login until next day
server.servlet.session.timeout=86400s
# Remember Me configuration - cookie will last for 3 months (7776000 seconds = 90 days)
# IMPORTANT: Change this key to a secure random value in production!
# Generate a secure key: openssl rand -base64 32
spring.security.remember-me.key=${REMEMBER_ME_KEY:defaultInsecureKeyForDevelopment}
spring.security.remember-me.token-validity-seconds=7776000

# Logging
logging.level.root=INFO
logging.level.com.javaexam=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.jdbc.core.JdbcTemplate=DEBUG
logging.level.org.springframework.jdbc.core.StatementCreatorUtils=TRACE
logging.level.org.springframework.jdbc.datasource.DataSourceTransactionManager=DEBUG
logging.level.org.springframework.jdbc.support.JdbcTransactionManager=DEBUG
